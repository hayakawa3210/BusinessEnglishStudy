<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business English 10</title>
  <style>
    /* ==========================================================================
       1. VARIABLES & RESET
       ========================================================================== */
    :root {
      --color-bg: #f8f9fa;
      --color-surface: #ffffff;
      --color-primary: #0056b3;
      --color-primary-light: #e6f0fa;
      --color-success: #28a745;
      --color-danger: #dc3545;
      --color-text: #212529;
      --color-text-muted: #6c757d;
      --color-border: #e9ecef;
      --color-shadow: rgba(0, 0, 0, 0.05);

      --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --radius-round: 50px;
      --radius-card: 16px;
      --transition-base: all 0.25s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background-color: var(--color-bg);
      color: var(--color-text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      background-color: var(--color-surface);
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.02);
      overflow: hidden;
    }

    /* Screen Visibility */
    .screen {
      display: none;
      flex-direction: column;
      height: 100%;
      padding: 24px 20px 100px 20px;
      overflow-y: auto;
    }

    .screen.active { display: flex; }

    /* Common Components */
    .screen-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-shrink: 0; }
    .btn-back { background: none; border: none; color: var(--color-primary); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; }
    .progress-container { background: var(--color-primary-light); border-radius: 10px; height: 8px; width: 100%; margin-bottom: 24px; overflow: hidden; flex-shrink: 0; }
    .progress-bar { background: var(--color-primary); height: 100%; width: 0%; transition: width 0.3s ease; }

    /* ==========================================================================
       2. HOME SCREEN
       ========================================================================== */
    .header { margin-bottom: 24px; }
    .brand-title { font-size: 1.8rem; font-weight: 800; color: var(--color-primary); }
    .sub-title { color: var(--color-text-muted); font-weight: 500; }
    .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
    .btn-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-card); padding: 20px 16px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: var(--transition-base); box-shadow: 0 4px 6px var(--color-shadow); }
    .btn-card:active { transform: scale(0.98); }
    .btn-card.primary { grid-column: span 2; background: var(--color-primary); color: #fff; border: none; }
    .btn-round { width: 100%; padding: 14px; background-color: var(--color-primary-light); color: var(--color-primary); border: none; border-radius: var(--radius-round); font-weight: 600; cursor: pointer; }

    /* ==========================================================================
       3. LESSON SCREEN
       ========================================================================== */
    .lesson-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
    .lesson-item { display: flex; align-items: center; gap: 15px; padding: 16px; border-radius: var(--radius-card); border: 2px solid var(--color-border); background: var(--color-surface); transition: var(--transition-base); }
    .lesson-item.active { border-color: var(--color-primary); background-color: #f0f7ff; transform: translateX(5px); }
    .lesson-item.completed { border-color: var(--color-success); opacity: 0.8; }
    .lesson-item.completed .step-number { background-color: var(--color-success); color: white; }
    .step-number { width: 32px; height: 32px; border-radius: 50%; background: var(--color-primary-light); color: var(--color-primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
    .lesson-info { flex: 1; }
    .lesson-label { font-size: 0.75rem; color: var(--color-text-muted); display: block; }
    .lesson-name { font-weight: 700; font-size: 1.1rem; }
    .btn-complete { width: 100%; padding: 18px; border-radius: var(--radius-round); border: none; background-color: var(--color-border); color: var(--color-text-muted); font-size: 1.1rem; font-weight: 700; cursor: not-allowed; transition: var(--transition-base); }
    .btn-complete.ready { background-color: var(--color-success); color: white; cursor: pointer; box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3); }

    /* ==========================================================================
       4. CHAT UI COMPONENTS (CONVERSATION SCREEN)
       ========================================================================== */
    .chat-container { display: flex; flex-direction: column; flex: 1; min-height: 0; background: #f1f3f5; border-radius: var(--radius-card); overflow: hidden; position: relative; }
    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    
    /* Bubble Base Styles */
    .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; animation: fadeIn 0.25s ease; }
    .chat-bubble.ai { background-color: var(--color-primary); color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
    .chat-bubble.user { background-color: var(--color-surface); color: var(--color-text); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 2px 4px var(--color-shadow); }
    .chat-bubble.system { background-color: transparent; color: var(--color-text-muted); font-size: 0.8rem; text-align: center; align-self: center; max-width: 100%; font-weight: 600; }
    
    /* Input Area */
    .chat-input-bar { display: flex; gap: 8px; padding: 10px; background: var(--color-surface); border-top: 1px solid var(--color-border); align-items: center; }
    .chat-input-field { flex: 1; padding: 12px 16px; border: 1px solid var(--color-border); border-radius: var(--radius-round); font-size: 0.95rem; outline: none; transition: var(--transition-base); }
    .chat-input-field:focus { border-color: var(--color-primary); }
    .btn-send { background: var(--color-primary); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; flex-shrink: 0; }
    .btn-send:disabled { background: var(--color-border); cursor: not-allowed; }

    /* Feedback Cards */
    .feedback-section { display: flex; flex-direction: column; gap: 16px; margin-top: 8px; }
    .feedback-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-card); padding: 16px; box-shadow: 0 4px 10px var(--color-shadow); }
    .feedback-title { font-size: 1rem; font-weight: 700; color: var(--color-primary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .feedback-body { font-size: 0.95rem; line-height: 1.6; color: #333; white-space: pre-line; }

    /* Reuse News styles for Global Overlay API */
    .api-key-overlay { display: flex; flex-direction: column; gap: 12px; background: #fff; border: 1px solid var(--color-border); padding: 20px; border-radius: var(--radius-card); margin-bottom: 20px; }
    .api-input { width: 100%; padding: 12px; border: 1px solid var(--color-border); border-radius: 8px; font-size: 0.9rem; }
    .loader-box { display: none; text-align: center; padding: 20px 0; color: var(--color-text-muted); font-weight: 600; }

    /* ==========================================================================
       5. STATUS BAR
       ========================================================================== */
    .status-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 72px; background-color: var(--color-surface); border-top: 1px solid var(--color-border); display: flex; justify-content: space-around; align-items: center; z-index: 10; }
    .status-item { text-align: center; }
    .status-label { font-size: 0.7rem; color: var(--color-text-muted); text-transform: uppercase; font-weight: 700; display: block; }
    .status-value { font-size: 1.1rem; font-weight: 700; }
    .status-value.highlight { color: var(--color-primary); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="app-container">
    
    <main id="homeScreen" class="screen active">
      <header class="header">
        <h1 class="brand-title">Business English 10</h1>
        <p class="sub-title">今日も10分学習しましょう</p>
      </header>
      <div class="menu-grid">
        <button class="btn-card primary" data-action="go-lesson"><span>Today's Lesson</span></button>
        <button class="btn-card" data-action="vocabulary"><span>Vocabulary</span></button>
        <button class="btn-card" data-action="news"><span>News</span></button>
        <button class="btn-card" data-action="go-conv"><span>Conversation</span></button>
        <button class="btn-card" data-action="writing"><span>Writing</span></button>
        <button class="btn-card" data-action="progress"><span>Progress</span></button>
      </div>
      <footer><button class="btn-round" data-action="settings">設定</button></footer>
    </main>

    <main id="lessonScreen" class="screen">
      <header class="screen-header"><button class="btn-back" data-action="go-home">←</button><h2>Today's Lesson</h2></header>
      <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
      <div class="lesson-list" id="lessonList"></div>
      <button id="completeBtn" class="btn-complete" data-action="complete-lesson">Complete!</button>
    </main>

    <main id="convScreen" class="screen">
      <header class="screen-header"><button class="btn-back" data-action="go-home">←</button><h2>Business Conversation</h2></header>
      
      <div class="api-key-overlay" id="convApiKeyBlock">
        <p style="font-size: 0.85rem; font-weight: 600; color: var(--color-text-muted);">Gemini APIキーを入力して会話を開始します：</p>
        <input type="password" id="convApiKeyInput" class="api-input" placeholder="AIzaSy...">
        <button class="btn-round" data-action="start-chat-api">会話レッスンを開始</button>
      </div>

      <div class="loader-box" id="convLoader">講師が挨拶を準備中...💬</div>

      <div class="chat-container" id="chatWrapper" style="display: none; height: 360px;">
        <div class="chat-messages" id="chatMessages">
          </div>
        
        <div class="chat-input-bar" id="chatInputBar">
          <input type="text" id="chatInputField" class="chat-input-field" placeholder="Type your English response...">
          <button class="btn-send" id="chatSendBtn" data-action="send-chat-msg">→</button>
        </div>
      </div>

      <div class="feedback-section" id="convFeedbackArea" style="display: none;">
        <h3 class="section-divider-title" style="border-left:4px solid var(--color-success); padding-left:8px; font-size:1.1rem; font-weight:800; margin-top:16px;">Lesson Feedback</h3>
        <div class="feedback-card"><div class="feedback-title">🔊 発音のポイント (Pronunciation)</div><div class="feedback-body" id="fbPron"></div></div>
        <div class="feedback-card"><div class="feedback-title">📝 文法の修正 (Grammar)</div><div class="feedback-body" id="fbGrammar"></div></div>
        <div class="feedback-card"><div class="feedback-title">💡 自然なビジネス表現 (Naturalness)</div><div class="feedback-body" id="fbNatural"></div></div>
        <div class="feedback-card"><div class="feedback-title">🚀 おすすめの改善例 (Better Examples)</div><div class="feedback-body" id="fbExample"></div></div>
        <button class="btn-round" style="background: var(--color-success); color:#fff; margin-top:12px;" data-action="finish-conv-lesson">結果をセーブして戻る</button>
      </div>
    </main>

    <section class="status-bar">
      <div class="status-item"><span class="status-label">Today's Streak</span><span class="status-value highlight" id="streakValue">5 days</span></div>
      <div class="status-item"><span class="status-label">Today's Score</span><span class="status-value" id="scoreValue">120 pts</span></div>
    </section>
  </div>

  <script>
    const LESSON_STEPS = [
      { id: 1, name: 'Vocabulary', type: 'Lesson 1' },
      { id: 2, name: 'News', type: 'Lesson 2' },
      { id: 3, name: 'Conversation', type: 'Lesson 3' },
      { id: 4, name: 'Writing', type: 'Lesson 4' }
    ];

    const App = {
      state: {
        currentScreen: 'home',
        currentLessonStep: 1,
        // Chat / Conv State
        chatTurnCount: 0, // ユーザーのターン数 (最大5回)
        chatHistory: [],  // API送信用コンテキストスタック
        isChatActive: true
      },

      init() {
        this.bindEvents();
        this.renderLessonList();
        const savedKey = localStorage.getItem('gemini_key');
        if(savedKey) {
          document.getElementById('convApiKeyInput').value = savedKey;
        }
      },

      bindEvents() {
        document.body.addEventListener('click', (e) => {
          const action = e.target.closest('[data-action]')?.dataset.action;
          if (action && this.actions[action]) this.actions[action](this);
        });
        // チャット入力欄でのEnterキー対応
        document.getElementById('chatInputField').addEventListener('keypress', (e) => {
          if (e.key === 'Enter' && !document.getElementById('chatSendBtn').disabled) {
            this.handleUserSendMessage();
          }
        });
      },

      switchScreen(screenName) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`${screenName}Screen`).classList.add('active');
        this.state.currentScreen = screenName;
      },

      renderLessonList() {
        document.getElementById('lessonList').innerHTML = LESSON_STEPS.map(lesson => `
          <div class="lesson-item" id="item-${lesson.id}">
            <div class="step-number">${lesson.id}</div>
            <div class="lesson-info"><span class="lesson-label">${lesson.type}</span><span class="lesson-name">${lesson.name}</span></div>
          </div>
        `).join('');
        this.updateLessonUI();
      },

      updateLessonUI() {
        const { currentLessonStep } = this.state;
        document.getElementById('progressBar').style.width = `${(currentLessonStep / LESSON_STEPS.length) * 100}%`;
        LESSON_STEPS.forEach(lesson => {
          const el = document.getElementById(`item-${lesson.id}`);
          if(!el) return;
          el.classList.remove('active', 'completed');
          if (lesson.id < currentLessonStep) { el.classList.add('completed'); el.querySelector('.step-number').innerHTML = '✓'; }
          else if (lesson.id === currentLessonStep) { el.classList.add('active'); el.querySelector('.step-number').innerHTML = lesson.id; }
        });
        const btn = document.getElementById('completeBtn');
        btn.classList.toggle('ready', currentLessonStep === LESSON_STEPS.length);
        btn.disabled = currentLessonStep !== LESSON_STEPS.length;
      },

      /* ==========================================================================
         GEMINI CONVERSATION SYSTEM (Lesson 3)
         ========================================================================== */
      async callGeminiAPI(apiKey, contents, isJson = false) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        const config = isJson ? { responseMimeType: "application/json" } : {};
        
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: contents, generationConfig: config })
        });
        if (!response.ok) throw new Error('API request failed');
        const data = await response.json();
        return data.candidates[0].content.parts[0].text;
      },

      async startConversationLesson() {
        const key = document.getElementById('convApiKeyInput').value.trim();
        if(!key) return alert('APIキーを入力してください');
        localStorage.setItem('gemini_key', key);

        document.getElementById('convApiKeyBlock').style.display = 'none';
        document.getElementById('convLoader').style.display = 'block';

        // チャット初期化
        this.state.chatTurnCount = 0;
        this.state.chatHistory = [];
        this.state.isChatActive = true;
        document.getElementById('chatMessages').innerHTML = '';
        document.getElementById('convFeedbackArea').style.display = 'none';
        document.getElementById('chatInputBar').style.display = 'flex';

        // 最初のプロンプト（講師の最初の挨拶生成）
        const systemInitPrompt = {
          role: "user",
          parts: [{ text: "You are an elite, supportive business English teacher. Start a realistic business chat conversation (e.g., small talk at an office, project kickoff, table manners, meeting client) suitable for a TOEIC 600 level student. Speak only 1-2 simple, professional sentences. Ask one clear question at the end to prompt the student. Speak ONLY in English." }]
        };

        try {
          const aiResponse = await this.callGeminiAPI(key, [systemInitPrompt]);
          document.getElementById('convLoader').style.display = 'none';
          document.getElementById('chatWrapper').style.display = 'flex';
          
          // チャット履歴に初期化として保存
          this.state.chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });
          this.appendChatBubble(aiResponse, 'ai');
          this.appendChatBubble('第1ターン (全5往復)', 'system');
        } catch(e) {
          alert('講師の起動に失敗しました。キーを確認してください。');
          document.getElementById('convApiKeyBlock').style.display = 'flex';
          document.getElementById('convLoader').style.display = 'none';
        }
      },

      appendChatBubble(text, sender) {
        const msgContainer = document.getElementById('chatMessages');
        const bubble = document.createElement('div');
        bubble.className = `chat-bubble ${sender}`;
        bubble.textContent = text;
        msgContainer.appendChild(bubble);
        this.scrollToBottom();
      },

      scrollToBottom() {
        const msgContainer = document.getElementById('chatMessages');
        msgContainer.scrollTop = msgContainer.scrollHeight;
      },

      async handleUserSendMessage() {
        if(!this.state.isChatActive) return;
        const inputEl = document.getElementById('chatInputField');
        const userText = inputEl.value.trim();
        if(!userText) return;

        inputEl.value = '';
        this.state.chatTurnCount++;
        this.appendChatBubble(userText, 'user');
        
        // 履歴に追加
        this.state.chatHistory.push({ role: "user", parts: [{ text: userText }] });

        // 送信ボタンとインプットをローディング中無効化
        const sendBtn = document.getElementById('chatSendBtn');
        sendBtn.disabled = true;
        inputEl.disabled = true;

        const key = localStorage.getItem('gemini_key');

        try {
          if (this.state.chatTurnCount < 5) {
            // --- 通常の会話ターン内 ---
            const promptContext = [
              { role: "user", parts: [{ text: "Context: You are a friendly Business English coach. Keep conversation at TOEIC 600 level. Reply naturally to the student's text in 1-2 sentences and ask a follow-up question. Do not evaluate yet. Speak ONLY in English." }] },
              ...this.state.chatHistory
            ];
            
            const aiResponse = await this.callGeminiAPI(key, promptContext);
            this.state.chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });
            this.appendChatBubble(aiResponse, 'ai');
            this.appendChatBubble(`第${this.state.chatTurnCount + 1}ターン (全5往復)`, 'system');

          } else {
            // --- 5往復に達したためフィードバック生成に切り替え ---
            this.state.isChatActive = false;
            this.appendChatBubble("5往復の会話終了！AI講師が総合分析レポートを作成しています...", "system");
            document.getElementById('chatInputBar').style.display = 'none';

            const feedbackPrompt = [
              ...this.state.chatHistory,
              { role: "user", parts: [{ text: "The 5-turn business chat has ended. Analyze all of the student's inputs. Output strict JSON format with exactly 4 keys: 'pronunciation' (advices for accents/linking sounds in Japanese text), 'grammar' (list corrections or confirmation in Japanese), 'naturalness' (how to sound more business professional in Japanese), and 'better_examples' (provide 2-3 specific phrases they could use based on the chat history in English with brief Japanese explanation). Schema: {'pronunciation':'...', 'grammar':'...', 'naturalness':'...', 'better_examples':'...'}" }] }
            ];

            const jsonResponse = await this.callGeminiAPI(key, feedbackPrompt, true);
            const fb = JSON.parse(jsonResponse);

            // フィードバック画面の展開マップ
            document.getElementById('fbPron').textContent = fb.pronunciation;
            document.getElementById('fbGrammar').textContent = fb.grammar;
            document.getElementById('fbNatural').textContent = fb.naturalness;
            document.getElementById('fbExample').textContent = fb.better_examples;
            
            document.getElementById('convFeedbackArea').style.display = 'flex';
            this.scrollToBottom();
          }
        } catch(e) {
          this.appendChatBubble("通信エラーが発生しました。接続を確認してください。", "system");
        } finally {
          sendBtn.disabled = false;
          inputEl.disabled = false;
          if(this.state.isChatActive) inputEl.focus();
        }
      },

      finishConvLesson() {
        // スコア加算 (+50pts)
        const currentScoreEl = document.getElementById('scoreValue');
        currentScoreEl.textContent = `${parseInt(currentScoreEl.textContent) + 50} pts`;
        
        // 進捗をStep 4 (Writing)に更新
        this.state.currentLessonStep = 4;
        this.renderLessonList();
        this.switchScreen('lesson');
      },

      /* ==========================================================================
         GLOBAL ACTIONS ROUTER
         ========================================================================== */
      actions: {
        'go-lesson': (ctx) => ctx.switchScreen('lesson'),
        'go-conv': (ctx) => ctx.switchScreen('conv'),
        'go-home': (ctx) => ctx.switchScreen('home'),
        'start-chat-api': (ctx) => ctx.startConversationLesson(),
        'send-chat-msg': (ctx) => ctx.handleUserSendMessage(),
        'finish-conv-lesson': (ctx) => ctx.finishConvLesson(),
        'vocabulary': () => alert('Vocabulary Menu'),
        'news': () => alert('News Menu'),
        'writing': () => alert('Writing Menu (Under Construction)'),
        'progress': () => alert('Progress Menu'),
        'settings': () => alert('Settings Menu'),
        'complete-lesson': (ctx) => { alert('Congratulations! Today\'s Lesson Completed!'); ctx.switchScreen('home'); }
      }
    };

    // 初期化起動
    App.init();
  </script>
</body>
</html>
